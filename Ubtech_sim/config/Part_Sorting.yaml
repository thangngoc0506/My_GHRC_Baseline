root_path: "../../assets/resources/"

scene_usd: 'Collected_Task4/SubUSDs/2_small_warehouse2.usd'

timelimit: 100

task_number: 1

part:
  # 定义 Part A 的资产池
  part_a_assets:
    - "Collected_Task1_PartA_ori_color/Task1_PartA.usd"
    - "Collected_Task1_PartA_red/Task1_PartA.usd"
  # 定义 Part B 的资产池
  part_b_assets:
    - "Collected_Part_B_blue/Part_B.usd"
    - "Collected_Part_B_ori_color/Part_B.usd"
  num_parts: 2  # 每种类别生成的数量

plane:
  plane_position: 
  - [0.75, 0.28, 1.04]
  plane_scale: 
  - [0.3, 0.25, 0.1] 

table:
  table_usd: 'Collected_table_v2/table_v2.usd'
  table_position: 
  - [0.75, 0.3, 0.5]
  table_scale: 
  - [1.9927, 1.8738, 1.1109]

box:
  box_usd: 'Box_blank/box_60_40_23_cut_0.usd'
  box_position: 
  - [1.2, 0.3, 1.05]
  box_scale: 
  - [0.38, 0.75, 0.36]
  lock_boxes: true   # 禁止物理引擎移动箱子，保持固定位置

robot:
  robot_usd: 'Collected_s2_v1_ecbg/s2_v1.usd' 
  robot_position: [0.7, -0.2, 0.9] 
  robot_rotation: [0, 0, 90]

grasp:
  target_index: 0
  lift_height: 0.17
  settle_time: 2.0
  approach_time: 3.0
  reach_time: 2.0
  hold_time: 1.0
  lift_time: 2.0
  tcp_offset: [0.0, 0.0, 0.0]   # sixforce_link 局部坐标系下 TCP 的偏移 (m)
  ik_rot_weight: 1.0
  # 物体散布区域 (世界坐标)，确保物体同时位于机器人相机视野和手臂可达范围内
  # 机器人位于 (0.6, -0.2, 0.958)，朝 +y 方向；桌面 z≈1.0m
  # x:[0.50, 0.80]  y:[0.10, 0.30]  — 桌面中心、手臂前方、相机正视区
  scatter_area:
    center: [0.75, 0.28, 1.04]   # 散布中心 [x, y, z]
    size:   [0.30, 0.23]         # 散布半宽 x方向, y方向 (m)  →  x:[0.50,0.80] y:[0.10,0.30]
